app-id: net.froemling.bombsquad
runtime: org.freedesktop.Platform
# TEMPORARY: pinned to the unstable 'master' runtime because no stable
# freedesktop release ships Python 3.14 yet (25.08 = 3.13; 3.14 lands in
# the future 26.08 release). master currently provides Python 3.14 + LLVM
# 22. This is a moving target -- revert to a stable runtime-version (and
# matching llvm extension / python refs below) once one ships 3.14, before
# this flatpak ships. See docs/followups.md.
runtime-version: "master"
sdk: org.freedesktop.Sdk
command: bombsquad.sh
finish-args:
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=pulseaudio
  - --device=dri
  # - --device=input
  - --persist=.ballisticakit

sdk-extensions:
  - org.freedesktop.Sdk.Extension.llvm22

modules:
  # The 'master' runtime currently provides python3.14 (required by
  # bombsquad). If a future runtime's python ever diverges from what
  # bombsquad needs, enable this python module to build it locally.

  # - name: Python
  #   sources:
  #     - type: archive
  #       url: https://www.python.org/ftp/python/3.14.5/Python-3.14.5.tar.xz
  #       sha256: { SHA256_CHECKSUM }
  #   config-opts:
  #     - --prefix=${FLATPAK_DEST}
  #     - --enable-shared
  #     - --enable-optimizations
  #     - --with-computed-gotos
  #     - --with-lto
  #     - --enable-ipv6
  #     - --with-system-expat
  #     - --with-system-ffi
  #     - --with-system-libmpdec
  #     - --enable-loadable-sqlite-extensions
  #     - --without-ensurepip
  #   cleanup:
  #     - /bin
  #     - /include
  #     - /lib/pkgconfig
  #     - /share

  # SDL2 is already provided by the runtime

  # - name: SDL2
  #   buildsystem: cmake
  #   builddir: true
  #   cleanup:
  #     - /bin
  #     - /include
  #     - /lib/pkgconfig
  #     - /lib/cmake
  #     - /share
  #     - "*.a"
  #   sources:
  #     - type: git
  #       url: https://github.com/libsdl-org/SDL
  #       tag: release-2.32.8

  # rsync is required by bombsquad's build system to stage files for the flatpak build
  # we can remove this in flathub version since we cannot access internet during the build

  - name: rsync
    buildsystem: autotools
    config-opts:
      - --prefix=${FLATPAK_DEST}
      - --disable-debug
      - --disable-locale
    sources:
      - type: archive
        url: https://download.samba.org/pub/rsync/src/rsync-3.4.1.tar.gz
        sha256: 2924bcb3a1ed8b551fc101f740b9f0fe0a202b115027647cf69850d65fd88c52
    cleanup:
      - "*"

  - name: bombsquad
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/llvm22/bin
      prepend-ld-library-path: /usr/lib/sdk/llvm22/lib
      build-args:
        - --share=network
      env:
        CMAKE_BUILD_TYPE: "Release"
    build-commands:
      # FLATPAK_DEST=/app, FLATPAK_ID=net.froemling.bombsquad
      - mkdir -p ${FLATPAK_DEST}/bin/bombsquad
      # Install uv into /app/bin (already on build PATH) so subsequent
      # ``make env`` / ``make cmake-build`` can build the project venv.
      - curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR=/app/bin INSTALLER_NO_MODIFY_PATH=1 sh
      # we need to fix .venv/bin/python3.14 which is a symlink to system python
      # of the machine the venv was created on, and then update the venv to fix
      # all the shebangs according to the current build env
      - rm -f .venv/bin/python3.14
      - ln -s /usr/bin/python3.14 .venv/bin/python3.14
      - python3.14 -m venv --upgrade .venv
      # Get rid of tools/pcommand and similar with wrong shebangs
      - make env-clean
      - make cmake-build
      - mv build/cmake/*/ballisticakit build/cmake/*/staged/
      - cp -r build/cmake/*/staged/* ${FLATPAK_DEST}/bin/bombsquad/
      - install -Dm755 bombsquad.sh ${FLATPAK_DEST}/bin/bombsquad.sh
      - install -Dm644 pconfig/flatpak/net.froemling.bombsquad.desktop ${FLATPAK_DEST}/share/applications/${FLATPAK_ID}.desktop
      - install -Dm644 pconfig/flatpak/net.froemling.bombsquad.metainfo.xml ${FLATPAK_DEST}/share/metainfo/${FLATPAK_ID}.metainfo.xml
      - install -Dm644 pconfig/flatpak/net.froemling.bombsquad.releases.xml ${FLATPAK_DEST}/share/metainfo/releases/${FLATPAK_ID}.releases.xml
      - install -Dm644 ${FLATPAK_ID}.png ${FLATPAK_DEST}/share/icons/hicolor/512x512/apps/${FLATPAK_ID}.png

    sources:
      - type: dir
        path: ./../../

      # - type: archive
      #   url: { ARCHIVE_URL }
      #   sha256: { SHA256_CHECKSUM }
      #   strip-components: 0

      - type: file
        dest-filename: net.froemling.bombsquad.png
        url: https://files.ballistica.net/bombsquad/promo/BombSquadIcon512.png
        sha256: c950d1b62da2714b1ed1afc42244f7e192be23172c89b6fa3e6eaaca8e45a89a

      - type: script
        dest-filename: bombsquad.sh
        commands:
          - cd /app/bin/bombsquad
          - exec ./ballisticakit
