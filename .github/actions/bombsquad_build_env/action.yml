name: "Setup BombSquad Environment"
description: "Common setup steps for BombSquad builds"

inputs:
  using-cmake:
    description: |
      "Set to true if building with cmake to enable caching"
      "Also sets up BA_APP_RUN_ENABLE_BUILDS env var"
    required: false
    type: boolean
    default: false

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.13"
    # ``make env`` builds the project venv via uv (uv venv +
    # uv pip install ...), so uv must be on PATH before that runs.
    # ``setup-uv`` is the official Astral-published action; it
    # installs uv and uses requirements.txt-keyed caching the same
    # way ``setup-python``'s ``cache: pip`` did before this switch.
    - name: Set up uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
        cache-dependency-glob: "pconfig/requirements.txt"
    - name: Cache Bombsquad assets
      id: cache-assets
      uses: actions/cache@v5
      env:
        cache-name: cache-bombsquad-assets
      with:
        path: |
          build/assets
          .cache/efrocache/
        key: ${{ runner.os }}-${{ env.cache-name }}-${{ hashFiles('.efrocachemap') }}
        restore-keys: |
          ${{ runner.os }}-${{ env.cache-name }}-
    - name: Setup project environment
      shell: bash
      run: make env
    - name: Update assets
      shell: bash
      run: |
        make assets-cmake
        make assets-windows
    # Following steps only run for inputs.using-cmake == 'true'
    - name: Install build packgages
      if: ${{ inputs.using-cmake == 'true' }}
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          libglut-dev \
          libopenal-dev \
          libvorbis-dev \
          ninja-build \
          libx11-dev libxext-dev libxrandr-dev libxcursor-dev libxi-dev \
          libxtst-dev libxfixes-dev libxss-dev libxkbcommon-dev libwayland-dev \
          libdecor-0-dev libgl1-mesa-dev libegl1-mesa-dev libasound2-dev \
          libpulse-dev libdbus-1-dev libudev-dev
    # libsdl3-dev isn't in Ubuntu 24.04 (ubuntu-latest) apt yet, and
    # ubuntu-26.04 GitHub-hosted runners aren't available, so build SDL3 from
    # source. Revisit (back to `apt install libsdl3-dev` on ubuntu-26.04) once
    # those runners go GA.
    - name: Build and install SDL3 from source
      if: ${{ inputs.using-cmake == 'true' }}
      shell: bash
      run: |
        SDL_VER=3.4.10
        curl -fsSL -o /tmp/SDL3.tar.gz \
          "https://github.com/libsdl-org/SDL/releases/download/release-$SDL_VER/SDL3-$SDL_VER.tar.gz"
        tar -xzf /tmp/SDL3.tar.gz -C /tmp
        cmake -S "/tmp/SDL3-$SDL_VER" -B /tmp/SDL3-build -G Ninja \
          -DCMAKE_BUILD_TYPE=Release -DSDL_SHARED=ON -DSDL_STATIC=OFF \
          -DSDL_TEST_LIBRARY=OFF -DSDL_EXAMPLES=OFF \
          -DCMAKE_INSTALL_PREFIX=/usr/local
        cmake --build /tmp/SDL3-build -j"$(nproc)"
        sudo cmake --install /tmp/SDL3-build
        sudo ldconfig
    - name: Setup env variables
      if: ${{ inputs.using-cmake == 'true' }}
      shell: bash
      run: |
        echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
        echo "BA_APP_RUN_ENABLE_BUILDS=1" >> $GITHUB_ENV
        echo CMAKE_EXTRA_ARGS="-DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
    - name: Setup sccache
      if: ${{ inputs.using-cmake == 'true' }}
      uses: mozilla-actions/sccache-action@v0.0.9
      with:
        disable_annotations: true
