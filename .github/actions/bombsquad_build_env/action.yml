name: "Setup BombSquad Environment"
description: "Common setup steps for BombSquad builds"

inputs:
  using-cmake:
    description: |
      "Set to true if building with cmake to enable caching"
      "Also sets up BA_APP_RUN_ENABLE_BUILDS env var"
    required: false
    type: boolean
    default: false

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v6
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: "3.14"
    # ``make env`` builds the project venv via uv (uv venv +
    # uv pip install ...), so uv must be on PATH before that runs.
    # ``setup-uv`` is the official Astral-published action; it
    # installs uv and uses requirements.txt-keyed caching the same
    # way ``setup-python``'s ``cache: pip`` did before this switch.
    - name: Set up uv
      uses: astral-sh/setup-uv@v8.1.0
      with:
        enable-cache: true
        cache-dependency-glob: "pconfig/requirements.txt"
    - name: Cache Bombsquad assets
      id: cache-assets
      uses: actions/cache@v5
      env:
        cache-name: cache-bombsquad-assets
      with:
        path: |
          build/assets
          .cache/efrocache/
        key: ${{ runner.os }}-${{ env.cache-name }}-${{ hashFiles('.efrocachemap') }}
        restore-keys: |
          ${{ runner.os }}-${{ env.cache-name }}-
    - name: Setup project environment
      shell: bash
      run: make env
    - name: Update assets
      shell: bash
      # These targets assemble bundled builtin assets by calling the
      # live bacloud server, and ephemeral runners hit a cold cache
      # every time. A cold asset-package meta-build can occasionally
      # surface a transient "Unable to reach bacloud server." from the
      # basn proxy before the server-side build warms up (the proxy
      # collapses distinct upstream conditions into that one message --
      # see ballistica-server-node docs/followups.md). Both targets are
      # idempotent and cache-backed, so a bounded retry absorbs that
      # hiccup; a genuine break still fails all attempts.
      run: |
        for attempt in 1 2 3; do
          if make assets-cmake && make assets-windows; then
            exit 0
          fi
          echo "::warning::Asset assembly failed (attempt ${attempt}/3); retrying in 20s..."
          sleep 20
        done
        echo "::error::Asset assembly failed after 3 attempts." >&2
        exit 1
    # Following steps only run for inputs.using-cmake == 'true'
    - name: Install build packgages
      if: ${{ inputs.using-cmake == 'true' }}
      shell: bash
      run: |
        sudo apt-get update -qq
        sudo apt-get install -y --no-install-recommends \
          libglut-dev \
          libopenal-dev \
          libvorbis-dev \
          libpango1.0-dev \
          ninja-build \
          libsdl3-dev
    - name: Setup env variables
      if: ${{ inputs.using-cmake == 'true' }}
      shell: bash
      run: |
        echo "SCCACHE_GHA_ENABLED=true" >> $GITHUB_ENV
        echo "BA_APP_RUN_ENABLE_BUILDS=1" >> $GITHUB_ENV
        echo CMAKE_EXTRA_ARGS="-DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
    - name: Setup sccache
      if: ${{ inputs.using-cmake == 'true' }}
      uses: mozilla-actions/sccache-action@v0.0.10
      with:
        disable_annotations: true
